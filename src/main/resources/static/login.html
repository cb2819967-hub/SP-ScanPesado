<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SP Scan Pesado</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="login-page">

<div id="view-login" class="view active">
  <div class="lc">

    <img src="img/logo.png" alt="SP Scan Pesado" class="ll">

    <div class="lt">SP Scan Pesado</div>
    <div class="ls">Sistema de Verificación Vehicular</div>

    <div class="lf2-group">
      <label>Correo Electrónico</label>
      <div class="input-icon-wrapper">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="login-email" placeholder="usuario@ejemplo.com">
      </div>
    </div>

    <div class="lf2-group">
      <label>Contraseña</label>
      <div class="input-icon-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="login-password" placeholder="••••••••">
        <button type="button" id="toggle-password" class="toggle-password-btn">
          <i class="fas fa-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="login-action-area">
      <button type="button" class="btn-primary-login" onclick="handleLogin('admin')">
        Iniciar Sesión
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script>
  // Lógica para mostrar/ocultar contraseña
  const togglePassword = document.getElementById('toggle-password');
  const passwordInput = document.getElementById('login-password');
  const eyeIcon = document.getElementById('eye-icon');

  togglePassword.addEventListener('click', function () {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    eyeIcon.classList.toggle('fa-eye');
    eyeIcon.classList.toggle('fa-eye-slash');
  });

  // Lógica original de notificaciones y login
  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.style.display='block';
    clearTimeout(t._t);
    t._t=setTimeout(()=>t.style.display='none',2800);
  }

  async function handleLogin(roleClicked) {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      toast('⚠️ Ingresa correo y contraseña');
      return;
    }

    try {
      toast('🔐 Validando credenciales...');
      let user = null;
      if (typeof apiLogin === 'function') {
        user = await apiLogin(email, password);
      } else {
        user = { nombre: 'Usuario Prueba', rol: roleClicked.toUpperCase() };
      }

      toast(`✅ Bienvenido, ${user.nombre}!`);

      localStorage.setItem('userRole', roleClicked);
      localStorage.setItem('userName', user.nombre);

      setTimeout(() => {
        if (roleClicked === 'admin') {
          window.location.href = '/dashboard.html';
        } else {
          window.location.href = '/tec-unidades.html';
        }
      }, 1000);

    } catch (err) {
      toast(`❌ ${err.message}`);
      console.error(err);
    }
  }
</script>
</body>
</html>
